<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cooldown Sound Reminder</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #10130f;
      --panel: #181d17;
      --panel-2: #20251e;
      --line: #343b31;
      --line-2: #4a5443;
      --text: #f1f5ec;
      --muted: #aeb8a7;
      --soft: #d8dfd1;
      --accent: #f2c94c;
      --accent-2: #54c6a8;
      --danger: #ff7b72;
      --ok: #7ee787;
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.28);
      --radius: 8px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background:
        linear-gradient(180deg, rgba(16, 19, 15, 0.86), rgba(16, 19, 15, 1)),
        repeating-linear-gradient(90deg, rgba(242, 201, 76, 0.06) 0 1px, transparent 1px 84px);
      color: var(--text);
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      min-height: 40px;
      border: 1px solid var(--line-2);
      border-radius: 7px;
      background: #252c22;
      color: var(--text);
      cursor: pointer;
      transition: border-color 160ms ease, transform 160ms ease, background 160ms ease, opacity 160ms ease;
    }

    button:hover:not(:disabled) {
      border-color: #748067;
      background: #2b3428;
    }

    button:active:not(:disabled) {
      transform: translateY(1px);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.46;
    }

    input,
    textarea,
    select {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #0f130e;
      color: var(--text);
      outline: none;
      padding: 9px 11px;
    }

    textarea {
      min-height: 124px;
      resize: vertical;
      line-height: 1.45;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(242, 201, 76, 0.12);
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--soft);
      font-size: 13px;
      font-weight: 650;
    }

    .shell {
      width: min(1440px, 100%);
      margin: 0 auto;
      padding: 22px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 0 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      display: grid;
      width: 42px;
      height: 42px;
      place-items: center;
      border: 1px solid rgba(242, 201, 76, 0.42);
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(242, 201, 76, 0.18), rgba(84, 198, 168, 0.12));
      color: var(--accent);
      font-weight: 900;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(22px, 2vw, 30px);
      letter-spacing: 0;
      line-height: 1.1;
    }

    .subtle {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 12px;
      background: rgba(24, 29, 23, 0.84);
      color: var(--soft);
      white-space: nowrap;
    }

    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--muted);
      box-shadow: 0 0 0 4px rgba(174, 184, 167, 0.09);
    }

    .status-pill.running .status-dot {
      background: var(--ok);
      box-shadow: 0 0 0 4px rgba(126, 231, 135, 0.12);
    }

    .status-pill.waiting .status-dot {
      background: var(--accent);
      box-shadow: 0 0 0 4px rgba(242, 201, 76, 0.12);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(320px, 430px) minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(24, 29, 23, 0.92);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      border-bottom: 1px solid var(--line);
      padding: 15px 16px;
      background: rgba(32, 37, 30, 0.86);
    }

    .panel-title {
      display: grid;
      gap: 3px;
    }

    .panel-title h2 {
      font-size: 16px;
      letter-spacing: 0;
    }

    .panel-body {
      display: grid;
      gap: 14px;
      padding: 16px;
    }

    .segmented {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 5px;
      background: #0f130e;
    }

    .segmented button {
      min-height: 36px;
      border-color: transparent;
      background: transparent;
      color: var(--muted);
      font-weight: 700;
    }

    .segmented button.active {
      background: #303829;
      color: var(--text);
      border-color: #596350;
    }

    .provider-panel {
      display: none;
      gap: 12px;
    }

    .provider-panel.active {
      display: grid;
    }

    .grid-2,
    .grid-3 {
      display: grid;
      gap: 12px;
    }

    .grid-2 {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .grid-3 {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
    }

    .button-row > button {
      flex: 1 1 132px;
      padding-inline: 12px;
      font-weight: 800;
    }

    .primary {
      background: #f2c94c;
      border-color: #f7da7a;
      color: #1a1606;
    }

    .primary:hover:not(:disabled) {
      background: #ffd866;
      border-color: #ffe493;
    }

    .stop {
      background: #3a1d1d;
      border-color: #703434;
      color: #ffd9d6;
    }

    .stop:hover:not(:disabled) {
      background: #4a2424;
      border-color: #9b4a43;
    }

    .capture-area {
      display: grid;
      gap: 12px;
    }

    .preview-wrap {
      position: relative;
      min-height: 430px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(45deg, rgba(255,255,255,0.025) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(255,255,255,0.025) 25%, transparent 25%),
        #0b0e0a;
      background-size: 24px 24px;
      overflow: hidden;
      user-select: none;
    }

    video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #050705;
    }

    .empty-preview {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 28px;
      color: var(--muted);
      text-align: center;
      pointer-events: none;
    }

    .crop-box {
      position: absolute;
      width: 25px;
      height: 25px;
      min-width: 8px;
      min-height: 8px;
      border: 2px solid var(--accent);
      background: rgba(242, 201, 76, 0.12);
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.0);
      cursor: move;
      display: none;
      z-index: 2;
    }

    .crop-box.visible {
      display: block;
    }

    .crop-box.active-drag {
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.35);
      z-index: 10;
    }

    .crop-label {
      position: absolute;
      top: -22px;
      left: -2px;
      font-size: 11px;
      font-weight: 900;
      padding: 1px 6px;
      border-radius: 4px 4px 0 0;
      color: #0f130e;
      pointer-events: none;
      white-space: nowrap;
    }

    .handle {
      position: absolute;
      right: -7px;
      bottom: -7px;
      width: 14px;
      height: 14px;
      border: 2px solid #10130f;
      border-radius: 50%;
      background: var(--accent);
      cursor: nwse-resize;
    }

    .preview-tools {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 170px;
      gap: 12px;
      align-items: stretch;
    }

    .thumb-card {
      display: grid;
      align-content: start;
      gap: 9px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #121710;
      padding: 12px;
    }

    .thumb-stage {
      display: grid;
      min-height: 150px;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #050705;
      overflow: hidden;
    }

    .thumb-stage canvas {
      width: min(100%, 150px);
      height: auto;
      image-rendering: pixelated;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .metric {
      display: grid;
      gap: 6px;
      min-height: 96px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #141914;
      padding: 12px;
    }

    .metric span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }

    .metric strong {
      align-self: end;
      font-size: clamp(22px, 3vw, 38px);
      line-height: 1;
      letter-spacing: 0;
      word-break: break-word;
    }

    .metric strong.small {
      font-size: clamp(16px, 2vw, 23px);
      line-height: 1.15;
    }

    .log {
      display: grid;
      gap: 8px;
      max-height: 250px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #0f130e;
      padding: 10px;
    }

    .log-entry {
      display: grid;
      grid-template-columns: 84px minmax(0, 1fr);
      gap: 10px;
      color: var(--soft);
      font-size: 13px;
      line-height: 1.45;
    }

    .log-entry time {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .inline-check {
      display: flex;
      align-items: center;
      gap: 9px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    .inline-check input {
      width: 17px;
      height: 17px;
      min-height: 17px;
      accent-color: var(--accent);
    }

    .hidden {
      display: none !important;
    }

    .timer-panel {
      display: grid;
      gap: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #121710;
      padding: 12px;
    }

    .timer-status {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #0f130e;
      padding: 9px 11px;
    }

    .timer-status span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
    }

    .timer-status strong {
      font-size: 20px;
      line-height: 1;
      letter-spacing: 0;
      white-space: nowrap;
    }

    /* ── Skill Slots ── */
    .slots-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding-bottom: 4px;
    }

    .slots-header h3 {
      font-size: 14px;
      font-weight: 800;
      color: var(--soft);
    }

    .add-slot-btn {
      min-height: 34px;
      padding: 0 14px;
      font-size: 13px;
      font-weight: 800;
      border: 1px dashed var(--line-2);
      background: transparent;
      color: var(--accent);
    }

    .add-slot-btn:hover:not(:disabled) {
      border-color: var(--accent);
      background: rgba(242, 201, 76, 0.06);
    }

    .skill-slots-container {
      display: grid;
      gap: 12px;
    }

    .skill-slot {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #161b14;
      overflow: hidden;
      transition: border-color 200ms ease;
    }

    .skill-slot:hover {
      border-color: var(--line-2);
    }

    .skill-slot-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 14px;
      background: rgba(32, 37, 30, 0.6);
      border-bottom: 1px solid var(--line);
      cursor: pointer;
      user-select: none;
    }

    .skill-slot-header:hover {
      background: rgba(40, 46, 37, 0.7);
    }

    .slot-badge-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .slot-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 900;
      color: #0f130e;
      flex-shrink: 0;
    }

    .slot-title {
      font-size: 14px;
      font-weight: 750;
      color: var(--text);
    }

    .slot-header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .slot-status-mini {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      padding: 3px 8px;
      border-radius: 4px;
      background: rgba(15, 19, 14, 0.5);
    }

    .slot-status-mini.active {
      color: var(--ok);
      background: rgba(126, 231, 135, 0.08);
    }

    .slot-delete-btn {
      min-height: 28px;
      width: 28px;
      padding: 0;
      border: 1px solid transparent;
      background: transparent;
      color: var(--muted);
      font-size: 16px;
      font-weight: 700;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slot-delete-btn:hover:not(:disabled) {
      color: var(--danger);
      border-color: rgba(255, 123, 114, 0.3);
      background: rgba(255, 123, 114, 0.08);
    }

    .skill-slot-body {
      display: grid;
      gap: 12px;
      padding: 14px;
    }

    .skill-slot.collapsed .skill-slot-body {
      display: none;
    }

    .sound-mode-row {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 13px;
      font-weight: 650;
      color: var(--soft);
    }

    .sound-mode-row label {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      flex-direction: row;
    }

    .sound-mode-row input[type="radio"] {
      width: 16px;
      height: 16px;
      min-height: 16px;
      accent-color: var(--accent);
    }

    .webaudio-config {
      display: none;
      gap: 12px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #0f130e;
      padding: 12px;
    }

    .webaudio-config.active {
      display: grid;
    }

    .file-sound-config {
      display: none;
      gap: 12px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #0f130e;
      padding: 12px;
    }

    .file-sound-config.active {
      display: grid;
    }

    .slot-metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .slot-metric {
      display: grid;
      gap: 4px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #0f130e;
      padding: 8px;
    }

    .slot-metric span {
      color: var(--muted);
      font-size: 11px;
      font-weight: 750;
    }

    .slot-metric strong {
      font-size: 16px;
      line-height: 1;
      letter-spacing: 0;
    }

    .slot-crop-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr)) auto;
      gap: 10px;
      align-items: end;
    }

    .slot-crop-row button {
      min-height: 40px;
      font-size: 12px;
      font-weight: 700;
      padding: 0 10px;
      white-space: nowrap;
    }

    .collapse-icon {
      font-size: 12px;
      color: var(--muted);
      transition: transform 200ms ease;
    }

    .skill-slot.collapsed .collapse-icon {
      transform: rotate(-90deg);
    }

    @media (max-width: 1060px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .preview-wrap {
        min-height: 360px;
      }
    }

    @media (max-width: 720px) {
      .shell {
        padding: 14px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .grid-2,
      .grid-3,
      .metric-grid,
      .preview-tools,
      .slot-metrics,
      .slot-crop-row {
        grid-template-columns: 1fr;
      }

      .preview-wrap {
        min-height: 280px;
      }

      .log-entry {
        grid-template-columns: 1fr;
        gap: 2px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">CD</div>
        <div>
          <h1>쿨타임 알림</h1>
          <p class="subtle">지정한 화면 영역의 노란 숫자를 읽고, 보정된 시간 뒤에 알림 소리를 재생합니다.</p>
        </div>
      </div>
      <div id="statusPill" class="status-pill">
        <span class="status-dot"></span>
        <span id="statusText">대기 중</span>
      </div>
    </header>

    <section class="layout">
      <aside class="panel">
        <div class="panel-header">
          <div class="panel-title">
            <h2>AI 설정</h2>
            <p class="subtle">Vertex AI, Google AI Studio, Custom 엔드포인트 중 하나를 선택</p>
          </div>
        </div>
        <div class="panel-body">
          <div class="segmented" role="tablist" aria-label="AI provider">
            <button id="providerVertex" class="active" type="button" role="tab" aria-selected="true">Vertex AI</button>
            <button id="providerStudio" type="button" role="tab" aria-selected="false">AI Studio</button>
            <button id="providerCustom" type="button" role="tab" aria-selected="false">Custom</button>
          </div>

          <div id="vertexPanel" class="provider-panel active">
            <div class="grid-2">
              <label>
                Project ID
                <input id="vertexProjectId" autocomplete="off" placeholder="my-gcp-project">
              </label>
              <label>
                Location
                <input id="vertexLocation" autocomplete="off" value="us-central1" placeholder="us-central1">
              </label>
            </div>
            <label>
              Client Email
              <input id="vertexClientEmail" autocomplete="off" placeholder="service-account@project.iam.gserviceaccount.com">
            </label>
            <label>
              Model ID
              <input id="vertexModelId" autocomplete="off" value="gemini-2.5-flash" placeholder="gemini-2.5-flash">
            </label>
            <label>
              Private Key
              <textarea id="vertexPrivateKey" spellcheck="false" autocomplete="off" placeholder="-----BEGIN PRIVATE KEY-----&#10;...&#10;-----END PRIVATE KEY-----"></textarea>
            </label>
            <div class="button-row">
              <button id="loadServiceJson" type="button">서비스 계정 JSON 불러오기</button>
              <input id="serviceJsonFile" class="hidden" type="file" accept=".json,application/json">
            </div>
          </div>

          <div id="studioPanel" class="provider-panel">
            <label>
              Google AI Studio API Key
              <input id="studioApiKey" type="password" autocomplete="off" placeholder="AIza...">
            </label>
            <label>
              Model ID
              <input id="studioModelId" autocomplete="off" value="gemini-2.5-flash" placeholder="gemini-2.5-flash">
            </label>
          </div>

          <div id="customPanel" class="provider-panel">
            <label>
              Endpoint URL
              <input id="customUrl" autocomplete="off" placeholder="https://example.com/v1/chat/completions">
            </label>
            <label>
              API Key
              <input id="customApiKey" type="password" autocomplete="off" placeholder="sk-...">
            </label>
            <label>
              Model ID
              <input id="customModelId" autocomplete="off" placeholder="your-vision-model">
            </label>
            <label>
              멀티모달 입력 순서
              <select id="customPartOrder">
                <option value="imageFirst">이미지 우선 컨텍스트</option>
                <option value="promptFirst">프롬프트 우선 인스트럭션</option>
              </select>
            </label>
          </div>

          <label class="inline-check">
            <input id="saveSettings" type="checkbox">
            이 브라우저에 설정 저장
          </label>
          <div class="button-row">
            <button id="saveSettingsNow" type="button">설정 저장</button>
            <button id="clearSettings" type="button">저장값 삭제</button>
          </div>
        </div>
      </aside>

      <section class="panel">
        <div class="panel-header">
          <div class="panel-title">
            <h2>메인</h2>
            <p class="subtle">화면 선택 후 크롭 박스를 노란 숫자 위에 맞추세요.</p>
          </div>
        </div>

        <div class="panel-body">
          <div class="button-row">
            <button id="selectScreen" type="button">화면 선택</button>
            <button id="singleRead" type="button">1회 인식</button>
            <button id="startBtn" class="primary" type="button">시작</button>
            <button id="stopBtn" class="stop" type="button" disabled>종료</button>
          </div>

          <label class="inline-check">
            <input id="lowLoadCapture" type="checkbox" checked>
            저부하 캡처 모드
          </label>

          <div class="timer-panel">
            <div class="grid-2">
              <label>
                fantasia 예약(분)
                <input id="fantasiaMinutes" type="number" min="0" step="0.1" value="10">
              </label>
              <div class="timer-status">
                <span>fantasia까지</span>
                <strong id="fantasiaRemaining">-</strong>
              </div>
            </div>
            <div class="button-row">
              <button id="fantasiaStart" type="button">fantasia 시작</button>
              <button id="fantasiaStop" class="stop" type="button" disabled>fantasia 취소</button>
              <button id="fantasiaTest" type="button">fantasia 테스트</button>
            </div>
          </div>

          <!-- Skill Slots -->
          <div class="slots-header">
            <h3>스킬 슬롯</h3>
            <button id="addSlotBtn" class="add-slot-btn" type="button">+ 스킬 슬롯 추가</button>
          </div>
          <div id="skillSlotsContainer" class="skill-slots-container"></div>

          <!-- Preview area -->
          <div class="capture-area">
            <div id="previewWrap" class="preview-wrap">
              <video id="sourceVideo" autoplay playsinline muted></video>
              <div id="emptyPreview" class="empty-preview">화면 선택을 누르면 선택한 창이나 탭이 여기에 표시됩니다.</div>
              <!-- crop boxes will be injected here dynamically -->
            </div>
          </div>

          <div id="log" class="log" aria-live="polite"></div>
        </div>
      </section>
    </section>
  </main>

  <audio id="alarmAudio" src="chicken.mp3" preload="auto"></audio>
  <audio id="fantasiaAudio" src="fantasia.mp3" preload="auto"></audio>

  <script>
    const $ = (id) => document.getElementById(id);

    const SLOT_COLORS = [
      { border: "#f2c94c", bg: "rgba(242, 201, 76, 0.12)", badge: "#f2c94c" },
      { border: "#54c6a8", bg: "rgba(84, 198, 168, 0.12)", badge: "#54c6a8" },
      { border: "#e879f9", bg: "rgba(232, 121, 249, 0.12)", badge: "#e879f9" },
      { border: "#f97316", bg: "rgba(249, 115, 22, 0.12)", badge: "#f97316" },
      { border: "#60a5fa", bg: "rgba(96, 165, 250, 0.12)", badge: "#60a5fa" },
      { border: "#fb7185", bg: "rgba(251, 113, 133, 0.12)", badge: "#fb7185" },
      { border: "#a3e635", bg: "rgba(163, 230, 53, 0.12)", badge: "#a3e635" },
      { border: "#c084fc", bg: "rgba(192, 132, 252, 0.12)", badge: "#c084fc" }
    ];

    const els = {
      statusPill: $("statusPill"),
      statusText: $("statusText"),
      providerVertex: $("providerVertex"),
      providerStudio: $("providerStudio"),
      providerCustom: $("providerCustom"),
      vertexPanel: $("vertexPanel"),
      studioPanel: $("studioPanel"),
      customPanel: $("customPanel"),
      vertexProjectId: $("vertexProjectId"),
      vertexLocation: $("vertexLocation"),
      vertexClientEmail: $("vertexClientEmail"),
      vertexModelId: $("vertexModelId"),
      vertexPrivateKey: $("vertexPrivateKey"),
      studioApiKey: $("studioApiKey"),
      studioModelId: $("studioModelId"),
      customUrl: $("customUrl"),
      customApiKey: $("customApiKey"),
      customModelId: $("customModelId"),
      customPartOrder: $("customPartOrder"),
      saveSettings: $("saveSettings"),
      saveSettingsNow: $("saveSettingsNow"),
      clearSettings: $("clearSettings"),
      loadServiceJson: $("loadServiceJson"),
      serviceJsonFile: $("serviceJsonFile"),
      fantasiaMinutes: $("fantasiaMinutes"),
      fantasiaStart: $("fantasiaStart"),
      fantasiaStop: $("fantasiaStop"),
      fantasiaTest: $("fantasiaTest"),
      fantasiaRemaining: $("fantasiaRemaining"),
      selectScreen: $("selectScreen"),
      singleRead: $("singleRead"),
      startBtn: $("startBtn"),
      stopBtn: $("stopBtn"),
      lowLoadCapture: $("lowLoadCapture"),
      previewWrap: $("previewWrap"),
      sourceVideo: $("sourceVideo"),
      emptyPreview: $("emptyPreview"),
      addSlotBtn: $("addSlotBtn"),
      skillSlotsContainer: $("skillSlotsContainer"),
      log: $("log"),
      alarmAudio: $("alarmAudio"),
      fantasiaAudio: $("fantasiaAudio")
    };

    const STORAGE_KEY = "cooldown-reminder-settings-v2";
    const OCR_PROMPT = [
      "이미지 안에 노란색 글씨로 표시된 쿨타임 숫자만 읽어주세요.",
      "다른 텍스트, 단위, 설명 없이 숫자만 답하세요.",
      "숫자가 보이지 않으면 NONE만 답하세요."
    ].join(" ");
    const COOLDOWN_PRESETS = {
      janus30: {
        label: "야누스 30",
        notifyOffsetSec: 50,
        repeatAfterSec: 15
      },
      janus30Under: {
        label: "야누스 30 미만",
        notifyOffsetSec: 10,
        repeatAfterSec: 10
      },
      pt30: {
        label: "파운틴 30",
        notifyOffsetSec: 0,
        repeatAfterSec: 5
      }
    };

    let slotIdCounter = 0;
    let audioCtx = null;

    function getAudioCtx() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }
      return audioCtx;
    }

    const state = {
      provider: "vertex",
      stream: null,
      running: false,
      globalRunId: 0,
      slots: [],
      fantasiaTimerId: null,
      fantasiaTickerId: null,
      fantasiaPlayAt: null,
      drag: null,
      activeDragSlotId: null
    };

    function createSlotData(overrides = {}) {
      slotIdCounter += 1;
      return {
        id: slotIdCounter,
        cooldownPreset: "custom",
        notifyOffsetSec: 0,
        repeatAfterSec: 3,
        volume: 1,
        soundMode: "file",        // 'file' | 'webaudio'
        soundRepeatCount: 1,      // for file mode
        webAudio: {
          waveform: "sine",
          frequency: 880,
          duration: 200,
          repeatCount: 3,
          repeatGap: 150
        },
        crop: { x: 0, y: 0, size: 25 },
        // Runtime
        running: false,
        activeRunId: 0,
        timerId: null,
        tickerId: null,
        nextPlayAt: null,
        cooldownHistory: [],
        collapsed: false,
        // DOM references (set after render)
        els: {},
        cropBoxEl: null,
        canvasEl: null,
        ...overrides
      };
    }

    // ── Utilities ──

    function nowLabel() {
      return new Intl.DateTimeFormat("ko-KR", {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      }).format(new Date());
    }

    function log(message) {
      const entry = document.createElement("div");
      entry.className = "log-entry";
      entry.innerHTML = `<time>${nowLabel()}</time><div>${escapeHtml(message)}</div>`;
      els.log.prepend(entry);
      while (els.log.children.length > 80) {
        els.log.lastElementChild.remove();
      }
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function setStatus(text, mode = "") {
      els.statusText.textContent = text;
      els.statusPill.className = `status-pill ${mode}`.trim();
    }

    function formatSeconds(value) {
      if (!Number.isFinite(value)) return "-";
      const sign = value < 0 ? "-" : "";
      const abs = Math.max(0, Math.abs(value));
      const minutes = Math.floor(abs / 60);
      const seconds = Math.floor(abs % 60);
      const tenths = Math.floor((abs - Math.floor(abs)) * 10);
      if (minutes > 0) {
        return `${sign}${minutes}:${String(seconds).padStart(2, "0")}`;
      }
      return `${sign}${seconds}.${tenths}s`;
    }

    function readNumber(input, fallback = 0) {
      const val = typeof input === "object" && input !== null ? input.value : input;
      const value = Number.parseFloat(val);
      return Number.isFinite(value) ? value : fallback;
    }

    function wait(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function getSlotColor(slot) {
      const index = state.slots.indexOf(slot);
      return SLOT_COLORS[(index >= 0 ? index : slot.id - 1) % SLOT_COLORS.length];
    }

    function getSlotDisplayIndex(slot) {
      const index = state.slots.indexOf(slot);
      return index >= 0 ? index + 1 : slot.id;
    }

    // ── Provider switching ──

    function switchProvider(provider) {
      state.provider = provider;
      const isVertex = provider === "vertex";
      const isStudio = provider === "studio";
      const isCustom = provider === "custom";
      els.providerVertex.classList.toggle("active", isVertex);
      els.providerStudio.classList.toggle("active", isStudio);
      els.providerCustom.classList.toggle("active", isCustom);
      els.providerVertex.setAttribute("aria-selected", String(isVertex));
      els.providerStudio.setAttribute("aria-selected", String(isStudio));
      els.providerCustom.setAttribute("aria-selected", String(isCustom));
      els.vertexPanel.classList.toggle("active", isVertex);
      els.studioPanel.classList.toggle("active", isStudio);
      els.customPanel.classList.toggle("active", isCustom);
      persistSettingsIfEnabled();
    }

    // ── Settings save/load ──

    function getSettings() {
      return {
        provider: state.provider,
        vertex: {
          projectId: els.vertexProjectId.value.trim(),
          location: els.vertexLocation.value.trim() || "us-central1",
          clientEmail: els.vertexClientEmail.value.trim(),
          modelId: els.vertexModelId.value.trim() || "gemini-2.5-flash",
          privateKey: els.vertexPrivateKey.value.trim()
        },
        studio: {
          apiKey: els.studioApiKey.value.trim(),
          modelId: els.studioModelId.value.trim() || "gemini-2.5-flash"
        },
        custom: {
          url: els.customUrl.value.trim(),
          apiKey: els.customApiKey.value.trim(),
          modelId: els.customModelId.value.trim(),
          partOrder: els.customPartOrder.value || "imageFirst"
        },
        capture: {
          fantasiaMinutes: Math.max(0, readNumber(els.fantasiaMinutes, 10)),
          lowLoadCapture: els.lowLoadCapture.checked
        },
        slots: state.slots.map(slot => ({
          cooldownPreset: slot.cooldownPreset,
          notifyOffsetSec: slot.notifyOffsetSec,
          repeatAfterSec: slot.repeatAfterSec,
          volume: slot.volume,
          soundMode: slot.soundMode,
          soundRepeatCount: slot.soundRepeatCount,
          webAudio: { ...slot.webAudio },
          crop: { ...slot.crop },
          collapsed: slot.collapsed
        })),
        saveSettings: els.saveSettings.checked
      };
    }

    function applySettings(settings) {
      if (!settings) return;
      const provider = ["vertex", "studio", "custom"].includes(settings.provider) ? settings.provider : "vertex";
      switchProvider(provider);
      if (settings.vertex) {
        els.vertexProjectId.value = settings.vertex.projectId || "";
        els.vertexLocation.value = settings.vertex.location || "us-central1";
        els.vertexClientEmail.value = settings.vertex.clientEmail || "";
        els.vertexModelId.value = settings.vertex.modelId || "gemini-2.5-flash";
        els.vertexPrivateKey.value = settings.vertex.privateKey || "";
      }
      if (settings.studio) {
        els.studioApiKey.value = settings.studio.apiKey || "";
        els.studioModelId.value = settings.studio.modelId || "gemini-2.5-flash";
      }
      if (settings.custom) {
        els.customUrl.value = settings.custom.url || "";
        els.customApiKey.value = settings.custom.apiKey || "";
        els.customModelId.value = settings.custom.modelId || "";
        els.customPartOrder.value = settings.custom.partOrder || "imageFirst";
      }
      if (settings.capture) {
        els.fantasiaMinutes.value = settings.capture.fantasiaMinutes ?? 10;
        els.lowLoadCapture.checked = settings.capture.lowLoadCapture !== false;
      }

      // Clear existing slots
      for (const slot of [...state.slots]) {
        removeSlot(slot.id, true);
      }

      if (Array.isArray(settings.slots) && settings.slots.length > 0) {
        for (const slotData of settings.slots) {
          const slot = createSlotData({
            cooldownPreset: slotData.cooldownPreset || "custom",
            notifyOffsetSec: slotData.notifyOffsetSec ?? 0,
            repeatAfterSec: slotData.repeatAfterSec ?? 3,
            volume: slotData.volume ?? 1,
            soundMode: slotData.soundMode || "file",
            soundRepeatCount: slotData.soundRepeatCount ?? 1,
            webAudio: {
              waveform: slotData.webAudio?.waveform || "sine",
              frequency: slotData.webAudio?.frequency ?? 880,
              duration: slotData.webAudio?.duration ?? 200,
              repeatCount: slotData.webAudio?.repeatCount ?? 3,
              repeatGap: slotData.webAudio?.repeatGap ?? 150
            },
            crop: {
              x: slotData.crop?.x ?? 0,
              y: slotData.crop?.y ?? 0,
              size: Math.max(8, slotData.crop?.size ?? 25)
            },
            collapsed: Boolean(slotData.collapsed)
          });
          state.slots.push(slot);
          renderSlotElement(slot);
          renderCropBoxForSlot(slot);
        }
      } else {
        addSlot();
      }

      els.saveSettings.checked = Boolean(settings.saveSettings);
    }

    function loadSettings() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          applySettings(JSON.parse(raw));
          log("저장된 설정을 불러왔습니다.");
        } else {
          // Try v1 migration
          const v1 = localStorage.getItem("cooldown-reminder-settings-v1");
          if (v1) {
            const oldSettings = JSON.parse(v1);
            const newSettings = {
              ...oldSettings,
              slots: [{
                cooldownPreset: oldSettings.capture?.cooldownPreset || "custom",
                notifyOffsetSec: oldSettings.capture?.notifyOffsetSec ?? 0,
                repeatAfterSec: oldSettings.capture?.repeatAfterSec ?? 3,
                volume: oldSettings.capture?.alarmVolume ?? 1,
                soundMode: "file",
                soundRepeatCount: 1,
                webAudio: { waveform: "sine", frequency: 880, duration: 200, repeatCount: 3, repeatGap: 150 },
                crop: oldSettings.capture?.crop || { x: 0, y: 0, size: 25 }
              }],
              capture: {
                fantasiaMinutes: oldSettings.capture?.fantasiaMinutes ?? 10,
                lowLoadCapture: oldSettings.capture?.lowLoadCapture !== false
              }
            };
            applySettings(newSettings);
            log("v1 설정을 마이그레이션했습니다.");
          } else {
            addSlot();
          }
        }
      } catch (error) {
        log(`설정 불러오기 실패: ${error.message}`);
        if (state.slots.length === 0) addSlot();
      }
    }

    function saveSettings() {
      const settings = getSettings();
      settings.saveSettings = true;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));
      els.saveSettings.checked = true;
      log("설정을 저장했습니다.");
    }

    function persistSettingsIfEnabled() {
      if (!els.saveSettings.checked) return;
      const settings = getSettings();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));
    }

    function clearSavedSettings() {
      localStorage.removeItem(STORAGE_KEY);
      localStorage.removeItem("cooldown-reminder-settings-v1");
      els.saveSettings.checked = false;
      log("저장된 설정을 삭제했습니다.");
    }

    // ── Slot Management ──

    function addSlot(overrides = {}) {
      const slot = createSlotData(overrides);
      state.slots.push(slot);
      renderSlotElement(slot);
      renderCropBoxForSlot(slot);
      persistSettingsIfEnabled();
      log(`스킬 슬롯 ${getSlotDisplayIndex(slot)}을 추가했습니다.`);
      return slot;
    }

    function removeSlot(slotId, silent = false) {
      const index = state.slots.findIndex(s => s.id === slotId);
      if (index < 0) return;
      const slot = state.slots[index];

      // Stop slot loop
      stopSlotLoop(slot);

      // Remove DOM
      const card = document.getElementById(`slot-card-${slotId}`);
      if (card) card.remove();
      const cropBox = document.getElementById(`crop-box-${slotId}`);
      if (cropBox) cropBox.remove();

      state.slots.splice(index, 1);

      // Re-number remaining slots
      updateAllSlotNumbers();
      renderAllCropBoxes();

      if (!silent) {
        persistSettingsIfEnabled();
        log(`스킬 슬롯을 삭제했습니다.`);
      }
    }

    function updateAllSlotNumbers() {
      state.slots.forEach((slot, i) => {
        const badge = document.querySelector(`#slot-card-${slot.id} .slot-badge`);
        if (badge) {
          const color = getSlotColor(slot);
          badge.textContent = i + 1;
          badge.style.background = color.badge;
        }
        const title = document.querySelector(`#slot-card-${slot.id} .slot-title`);
        if (title) {
          title.textContent = `슬롯 ${i + 1}`;
        }
      });
    }

    // ── Slot DOM Rendering ──

    function renderSlotElement(slot) {
      const color = getSlotColor(slot);
      const displayIndex = getSlotDisplayIndex(slot);

      const card = document.createElement("div");
      card.className = `skill-slot${slot.collapsed ? " collapsed" : ""}`;
      card.id = `slot-card-${slot.id}`;

      card.innerHTML = `
        <div class="skill-slot-header" data-action="toggle">
          <div class="slot-badge-row">
            <div class="slot-badge" style="background:${color.badge}">${displayIndex}</div>
            <span class="slot-title">슬롯 ${displayIndex}</span>
            <span class="collapse-icon">▼</span>
          </div>
          <div class="slot-header-right">
            <span class="slot-status-mini" data-el="statusMini">대기</span>
            <button class="slot-delete-btn" type="button" data-action="delete" title="슬롯 삭제">✕</button>
          </div>
        </div>
        <div class="skill-slot-body">
          <div class="grid-3">
            <label>
              자동 세팅
              <select data-el="cooldownPreset">
                <option value="custom">사용자 지정</option>
                <option value="janus30">야누스 30</option>
                <option value="janus30Under">야누스 30 미만</option>
                <option value="pt30">파운틴 30</option>
              </select>
            </label>
            <label>
              알림 지연(초)
              <input data-el="notifyOffsetSec" type="number" min="-60" step="0.1" value="${slot.notifyOffsetSec}">
            </label>
            <label>
              재인식 대기(초)
              <input data-el="repeatAfterSec" type="number" min="0" step="0.1" value="${slot.repeatAfterSec}">
            </label>
          </div>
          <label>
            볼륨
            <input data-el="volume" type="number" min="0" max="1" step="0.05" value="${slot.volume}">
          </label>

          <div style="display:grid;gap:8px;">
            <div class="sound-mode-row">
              <span style="color:var(--muted);">소리:</span>
              <label><input type="radio" name="sound-mode-${slot.id}" value="file" ${slot.soundMode === "file" ? "checked" : ""} data-el="soundModeFile"> chicken.mp3</label>
              <label><input type="radio" name="sound-mode-${slot.id}" value="webaudio" ${slot.soundMode === "webaudio" ? "checked" : ""} data-el="soundModeWebAudio"> Web Audio</label>
            </div>
            <div class="file-sound-config ${slot.soundMode === "file" ? "active" : ""}" data-el="fileSoundConfig">
              <label>
                반복 횟수
                <input data-el="soundRepeatCount" type="number" min="1" max="10" step="1" value="${slot.soundRepeatCount}">
              </label>
            </div>
            <div class="webaudio-config ${slot.soundMode === "webaudio" ? "active" : ""}" data-el="webAudioConfig">
              <div class="grid-2">
                <label>
                  파형
                  <select data-el="waveform">
                    <option value="sine" ${slot.webAudio.waveform === "sine" ? "selected" : ""}>Sine</option>
                    <option value="square" ${slot.webAudio.waveform === "square" ? "selected" : ""}>Square</option>
                    <option value="triangle" ${slot.webAudio.waveform === "triangle" ? "selected" : ""}>Triangle</option>
                    <option value="sawtooth" ${slot.webAudio.waveform === "sawtooth" ? "selected" : ""}>Sawtooth</option>
                  </select>
                </label>
                <label>
                  주파수 (Hz)
                  <input data-el="frequency" type="number" min="200" max="2000" step="10" value="${slot.webAudio.frequency}">
                </label>
              </div>
              <div class="grid-3">
                <label>
                  길이 (ms)
                  <input data-el="duration" type="number" min="50" max="2000" step="10" value="${slot.webAudio.duration}">
                </label>
                <label>
                  반복 횟수
                  <input data-el="waRepeatCount" type="number" min="1" max="20" step="1" value="${slot.webAudio.repeatCount}">
                </label>
                <label>
                  간격 (ms)
                  <input data-el="repeatGap" type="number" min="50" max="1000" step="10" value="${slot.webAudio.repeatGap}">
                </label>
              </div>
            </div>
          </div>

          <div class="slot-crop-row">
            <label>
              X
              <input data-el="cropX" type="number" min="0" step="1" value="${Math.round(slot.crop.x)}">
            </label>
            <label>
              Y
              <input data-el="cropY" type="number" min="0" step="1" value="${Math.round(slot.crop.y)}">
            </label>
            <label>
              크기(px)
              <input data-el="cropSize" type="number" min="8" step="1" value="${Math.round(slot.crop.size)}">
            </label>
            <button type="button" data-action="testSound">소리 테스트</button>
          </div>

          <div class="slot-metrics">
            <div class="slot-metric"><span>AI 응답</span><strong data-el="aiAnswer">-</strong></div>
            <div class="slot-metric"><span>응답 지연</span><strong data-el="latencyText">-</strong></div>
            <div class="slot-metric"><span>보정 쿨타임</span><strong data-el="cooldownText">-</strong></div>
            <div class="slot-metric"><span>재생까지</span><strong data-el="remainingText">-</strong></div>
          </div>

          <div style="display:grid;gap:6px;">
            <p class="subtle" data-el="thumbLabel">최근 캡처</p>
            <div class="thumb-stage">
              <canvas data-el="captureCanvas" width="${slot.crop.size}" height="${slot.crop.size}" style="width:min(100%,120px);height:auto;image-rendering:pixelated;"></canvas>
            </div>
          </div>
        </div>
      `;

      // Bind DOM element references
      const elMap = {};
      card.querySelectorAll("[data-el]").forEach(el => {
        elMap[el.dataset.el] = el;
      });
      slot.els = elMap;
      slot.canvasEl = elMap.captureCanvas;

      // Set preset value
      if (elMap.cooldownPreset) {
        elMap.cooldownPreset.value = slot.cooldownPreset;
      }

      // Event: toggle collapse
      card.querySelector('[data-action="toggle"]').addEventListener("click", (e) => {
        if (e.target.closest('[data-action="delete"]')) return;
        slot.collapsed = !slot.collapsed;
        card.classList.toggle("collapsed", slot.collapsed);
        persistSettingsIfEnabled();
      });

      // Event: delete
      card.querySelector('[data-action="delete"]').addEventListener("click", (e) => {
        e.stopPropagation();
        if (state.slots.length <= 1) {
          log("최소 1개의 슬롯이 필요합니다.");
          return;
        }
        removeSlot(slot.id);
      });

      // Event: test sound
      card.querySelector('[data-action="testSound"]').addEventListener("click", async () => {
        try {
          syncSlotFromUI(slot);
          await playSlotSound(slot);
        } catch (err) {
          log(`소리 테스트 실패: ${err.message}`);
        }
      });

      // Event: preset change
      elMap.cooldownPreset.addEventListener("change", () => {
        const val = elMap.cooldownPreset.value;
        const preset = COOLDOWN_PRESETS[val];
        if (preset) {
          elMap.notifyOffsetSec.value = preset.notifyOffsetSec;
          elMap.repeatAfterSec.value = preset.repeatAfterSec;
          slot.cooldownPreset = val;
          slot.notifyOffsetSec = preset.notifyOffsetSec;
          slot.repeatAfterSec = preset.repeatAfterSec;
          log(`슬롯 ${getSlotDisplayIndex(slot)}: ${preset.label} 적용`);
        } else {
          slot.cooldownPreset = "custom";
        }
        persistSettingsIfEnabled();
      });

      // Event: sound mode switch
      const onSoundModeChange = () => {
        const mode = elMap.soundModeWebAudio.checked ? "webaudio" : "file";
        slot.soundMode = mode;
        elMap.fileSoundConfig.classList.toggle("active", mode === "file");
        elMap.webAudioConfig.classList.toggle("active", mode === "webaudio");
        persistSettingsIfEnabled();
      };
      elMap.soundModeFile.addEventListener("change", onSoundModeChange);
      elMap.soundModeWebAudio.addEventListener("change", onSoundModeChange);

      // Event: inputs change -> persist
      const inputEls = [
        elMap.notifyOffsetSec, elMap.repeatAfterSec, elMap.volume,
        elMap.soundRepeatCount, elMap.waveform, elMap.frequency,
        elMap.duration, elMap.waRepeatCount, elMap.repeatGap
      ];
      for (const inp of inputEls) {
        inp.addEventListener("input", () => {
          syncSlotFromUI(slot);
          // If user manually changes timing, set preset to custom
          if (inp === elMap.notifyOffsetSec || inp === elMap.repeatAfterSec) {
            elMap.cooldownPreset.value = "custom";
            slot.cooldownPreset = "custom";
          }
          persistSettingsIfEnabled();
        });
      }
      elMap.waveform.addEventListener("change", () => {
        syncSlotFromUI(slot);
        persistSettingsIfEnabled();
      });

      // Event: crop inputs
      for (const inp of [elMap.cropX, elMap.cropY, elMap.cropSize]) {
        inp.addEventListener("input", () => {
          slot.crop.x = Math.max(0, readNumber(elMap.cropX, 0));
          slot.crop.y = Math.max(0, readNumber(elMap.cropY, 0));
          slot.crop.size = Math.max(8, readNumber(elMap.cropSize, 25));
          renderCropBoxForSlot(slot);
          persistSettingsIfEnabled();
        });
      }

      els.skillSlotsContainer.appendChild(card);
    }

    function syncSlotFromUI(slot) {
      const e = slot.els;
      slot.notifyOffsetSec = readNumber(e.notifyOffsetSec, 0);
      slot.repeatAfterSec = readNumber(e.repeatAfterSec, 3);
      slot.volume = Math.min(1, Math.max(0, readNumber(e.volume, 1)));
      slot.soundRepeatCount = Math.max(1, Math.min(10, Math.round(readNumber(e.soundRepeatCount, 1))));
      slot.webAudio.waveform = e.waveform.value;
      slot.webAudio.frequency = Math.max(200, Math.min(2000, readNumber(e.frequency, 880)));
      slot.webAudio.duration = Math.max(50, Math.min(2000, readNumber(e.duration, 200)));
      slot.webAudio.repeatCount = Math.max(1, Math.min(20, Math.round(readNumber(e.waRepeatCount, 3))));
      slot.webAudio.repeatGap = Math.max(50, Math.min(1000, readNumber(e.repeatGap, 150)));
    }

    // ── Crop Box Rendering ──

    function renderCropBoxForSlot(slot) {
      if (!els.sourceVideo.videoWidth) return;
      clampCrop(slot);
      const color = getSlotColor(slot);
      let box = document.getElementById(`crop-box-${slot.id}`);
      if (!box) {
        box = document.createElement("div");
        box.className = "crop-box";
        box.id = `crop-box-${slot.id}`;
        box.innerHTML = `<div class="crop-label"></div><div class="handle" data-handle="resize"></div>`;
        slot.cropBoxEl = box;
        els.previewWrap.appendChild(box);
        attachCropBoxEvents(slot, box);
      }

      const labelEl = box.querySelector(".crop-label");
      const handleEl = box.querySelector(".handle");
      const displayIndex = getSlotDisplayIndex(slot);

      box.style.borderColor = color.border;
      box.style.background = color.bg;
      labelEl.style.background = color.badge;
      labelEl.textContent = displayIndex;
      handleEl.style.background = color.badge;

      const vbox = getVideoContentBox();
      const left = vbox.left + (slot.crop.x / vbox.videoWidth) * vbox.width;
      const top = vbox.top + (slot.crop.y / vbox.videoHeight) * vbox.height;
      const size = (slot.crop.size / vbox.videoWidth) * vbox.width;
      box.style.transform = "none";
      box.style.left = `${left}px`;
      box.style.top = `${top}px`;
      box.style.width = `${Math.max(8, size)}px`;
      box.style.height = `${Math.max(8, size)}px`;
      box.classList.add("visible");

      syncSlotCropInputs(slot);
    }

    function renderAllCropBoxes() {
      for (const slot of state.slots) {
        renderCropBoxForSlot(slot);
      }
    }

    function syncSlotCropInputs(slot) {
      if (!slot.els.cropX) return;
      slot.els.cropX.value = Math.round(slot.crop.x);
      slot.els.cropY.value = Math.round(slot.crop.y);
      slot.els.cropSize.value = Math.round(slot.crop.size);
    }

    function clampCrop(slot) {
      const videoWidth = els.sourceVideo.videoWidth || Math.max(25, slot.crop.size);
      const videoHeight = els.sourceVideo.videoHeight || Math.max(25, slot.crop.size);
      slot.crop.size = Math.max(8, Math.min(slot.crop.size, videoWidth, videoHeight));
      slot.crop.x = Math.max(0, Math.min(slot.crop.x, videoWidth - slot.crop.size));
      slot.crop.y = Math.max(0, Math.min(slot.crop.y, videoHeight - slot.crop.size));
    }

    function attachCropBoxEvents(slot, box) {
      box.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        event.stopPropagation();
        const mode = event.target?.dataset?.handle === "resize" ? "resize" : "move";
        const point = pointToVideoCoords(event.clientX, event.clientY);

        // Remove active from all, add to this one
        document.querySelectorAll(".crop-box").forEach(b => b.classList.remove("active-drag"));
        box.classList.add("active-drag");

        state.drag = {
          mode,
          startX: point.x,
          startY: point.y,
          crop: { ...slot.crop }
        };
        state.activeDragSlotId = slot.id;
        box.setPointerCapture(event.pointerId);
      });

      box.addEventListener("pointermove", (event) => {
        if (!state.drag || state.activeDragSlotId !== slot.id) return;
        const point = pointToVideoCoords(event.clientX, event.clientY);
        const dx = point.x - state.drag.startX;
        const dy = point.y - state.drag.startY;
        if (state.drag.mode === "move") {
          slot.crop.x = state.drag.crop.x + dx;
          slot.crop.y = state.drag.crop.y + dy;
        } else {
          const delta = Math.max(dx, dy);
          slot.crop.size = state.drag.crop.size + delta;
        }
        renderCropBoxForSlot(slot);
      });

      box.addEventListener("pointerup", () => {
        state.drag = null;
        state.activeDragSlotId = null;
        box.classList.remove("active-drag");
        persistSettingsIfEnabled();
      });
      box.addEventListener("pointercancel", () => {
        state.drag = null;
        state.activeDragSlotId = null;
        box.classList.remove("active-drag");
      });
    }

    // ── Video/Capture ──

    function getVideoContentBox() {
      const wrapRect = els.previewWrap.getBoundingClientRect();
      const videoWidth = els.sourceVideo.videoWidth || 16;
      const videoHeight = els.sourceVideo.videoHeight || 9;
      const wrapRatio = wrapRect.width / wrapRect.height;
      const videoRatio = videoWidth / videoHeight;
      let width = wrapRect.width;
      let height = wrapRect.height;
      let left = 0;
      let top = 0;
      if (wrapRatio > videoRatio) {
        width = wrapRect.height * videoRatio;
        left = (wrapRect.width - width) / 2;
      } else {
        height = wrapRect.width / videoRatio;
        top = (wrapRect.height - height) / 2;
      }
      return { left, top, width, height, videoWidth, videoHeight };
    }

    function pointToVideoCoords(clientX, clientY) {
      const wrapRect = els.previewWrap.getBoundingClientRect();
      const box = getVideoContentBox();
      const localX = clientX - wrapRect.left - box.left;
      const localY = clientY - wrapRect.top - box.top;
      return {
        x: (localX / box.width) * box.videoWidth,
        y: (localY / box.height) * box.videoHeight
      };
    }

    async function selectScreen() {
      if (!navigator.mediaDevices?.getDisplayMedia) {
        throw new Error("이 브라우저는 화면 캡처 API를 지원하지 않습니다.");
      }

      stopStreamOnly();
      const stream = await navigator.mediaDevices.getDisplayMedia({
        video: {
          cursor: "never",
          displaySurface: "window"
        },
        audio: false
      });

      await applyCaptureBudget(stream);
      state.stream = stream;
      els.sourceVideo.srcObject = stream;
      els.emptyPreview.classList.add("hidden");
      await waitForVideoReady();

      // Position crop boxes for slots that are at 0,0
      for (const slot of state.slots) {
        clampCrop(slot);
        if (slot.crop.x === 0 && slot.crop.y === 0) {
          const offset = state.slots.indexOf(slot) * 30;
          slot.crop.x = Math.max(0, Math.round((els.sourceVideo.videoWidth - slot.crop.size) / 2) + offset);
          slot.crop.y = Math.max(0, Math.round((els.sourceVideo.videoHeight - slot.crop.size) / 2) + offset);
        }
      }
      renderAllCropBoxes();

      stream.getVideoTracks()[0].addEventListener("ended", () => {
        if (state.stream === stream) {
          stopAll("화면 공유가 종료되었습니다.");
        }
      });
      log(`화면 선택 완료: ${els.sourceVideo.videoWidth}x${els.sourceVideo.videoHeight}`);
    }

    async function applyCaptureBudget(stream) {
      const track = stream.getVideoTracks()[0];
      if (!track || !els.lowLoadCapture.checked || typeof track.applyConstraints !== "function") {
        return;
      }
      try {
        await track.applyConstraints({
          frameRate: {
            ideal: 1,
            max: 2
          }
        });
        log("저부하 캡처 모드가 적용되었습니다.");
      } catch (error) {
        log(`저부하 캡처 모드 적용 실패: ${error.message}`);
      }
    }

    async function wakePreviewForCapture() {
      if (!els.lowLoadCapture.checked || !state.running || !els.sourceVideo.paused) {
        return;
      }
      try {
        await els.sourceVideo.play();
        await wait(250);
      } catch (error) {
        log(`프리뷰 재개 실패: ${error.message}`);
      }
    }

    function restPreviewAfterCapture() {
      if (!els.lowLoadCapture.checked || !state.running) {
        return;
      }
      els.sourceVideo.pause();
    }

    function waitForVideoReady() {
      if (els.sourceVideo.videoWidth && els.sourceVideo.readyState >= 2) {
        return Promise.resolve();
      }
      return new Promise((resolve) => {
        const done = () => {
          els.sourceVideo.removeEventListener("loadedmetadata", done);
          els.sourceVideo.removeEventListener("playing", done);
          resolve();
        };
        els.sourceVideo.addEventListener("loadedmetadata", done, { once: true });
        els.sourceVideo.addEventListener("playing", done, { once: true });
      });
    }

    function captureRegionForSlot(slot) {
      if (!state.stream || !els.sourceVideo.videoWidth) {
        throw new Error("먼저 화면을 선택하세요.");
      }
      clampCrop(slot);
      const size = Math.max(8, Math.round(slot.crop.size));
      const canvas = slot.canvasEl;
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext("2d", { willReadFrequently: true });
      ctx.imageSmoothingEnabled = false;
      ctx.clearRect(0, 0, size, size);
      ctx.drawImage(
        els.sourceVideo,
        Math.round(slot.crop.x),
        Math.round(slot.crop.y),
        size,
        size,
        0,
        0,
        size,
        size
      );
      return canvas.toDataURL("image/png").split(",")[1];
    }

    // ── AI Recognition ──

    function validateSettings() {
      const settings = getSettings();
      if (settings.provider === "studio") {
        if (!settings.studio.apiKey) throw new Error("Google AI Studio API Key가 필요합니다.");
        if (!settings.studio.modelId) throw new Error("AI Studio Model ID가 필요합니다.");
      } else if (settings.provider === "custom") {
        if (!settings.custom.url) throw new Error("Custom Endpoint URL이 필요합니다.");
        if (!settings.custom.modelId) throw new Error("Custom Model ID가 필요합니다.");
      } else {
        if (!settings.vertex.projectId) throw new Error("Vertex AI Project ID가 필요합니다.");
        if (!settings.vertex.clientEmail) throw new Error("Vertex AI Client Email이 필요합니다.");
        if (!settings.vertex.privateKey) throw new Error("Vertex AI Private Key가 필요합니다.");
        if (!settings.vertex.modelId) throw new Error("Vertex AI Model ID가 필요합니다.");
      }
      return settings;
    }

    async function recognizeCooldownForSlot(slot) {
      const settings = validateSettings();
      let parsed = null;
      let usedFallback = false;
      let failureMessage = "";
      const startedAt = performance.now();
      let successfulCaptureStartedAt = startedAt;
      let rawText = "";
      const displayIndex = getSlotDisplayIndex(slot);

      const maxTries = 3;
      for (let attempt = 1; attempt <= maxTries; attempt++) {
        try {
          await wakePreviewForCapture();
          const captureStartedAt = performance.now();
          const imageBase64 = captureRegionForSlot(slot);
          restPreviewAfterCapture();
          updateSlotStatus(slot, "인식 중", true);

          const text = await callGeminiApi(settings, imageBase64);
          rawText = text;
          parsed = parseCooldownNumber(text, slot);
          if (parsed === null) {
            throw new Error(`숫자 인식 실패: ${text || "(빈 응답)"}`);
          }
          if (parsed > 60) {
            throw new Error(`인식된 숫자(${parsed})가 60초를 초과하여 재인식 시도`);
          }

          rememberCooldownResponse(slot, parsed);
          successfulCaptureStartedAt = captureStartedAt;
          break;
        } catch (error) {
          log(`슬롯${displayIndex} 인식 시도 ${attempt}/${maxTries} 실패: ${error.message}`);
          if (attempt === maxTries) {
            const average = getCooldownAverage(slot);
            if (average === null) {
              throw new Error(`${error.message} (최근 평균값이 아직 없습니다)`);
            }
            parsed = average;
            usedFallback = true;
            failureMessage = error.message;
            successfulCaptureStartedAt = startedAt;
          } else {
            await wait(500);
          }
        }
      }

      const totalLatencySec = (performance.now() - startedAt) / 1000;
      const latencySec = (performance.now() - successfulCaptureStartedAt) / 1000;
      const adjustedCooldownSec = Math.max(0, parsed - latencySec);
      const notifyOffsetSec = slot.notifyOffsetSec;
      const waitUntilSoundSec = Math.max(0, adjustedCooldownSec + notifyOffsetSec);

      if (slot.els.aiAnswer) slot.els.aiAnswer.textContent = usedFallback ? `평균 ${parsed.toFixed(1)}` : String(parsed);
      if (slot.els.latencyText) slot.els.latencyText.textContent = formatSeconds(latencySec);
      if (slot.els.cooldownText) slot.els.cooldownText.textContent = formatSeconds(adjustedCooldownSec);
      if (slot.els.remainingText) slot.els.remainingText.textContent = formatSeconds(waitUntilSoundSec);

      if (usedFallback) {
        log(`슬롯${displayIndex}: AI 실패(${failureMessage}) → 평균 ${parsed.toFixed(2)} 적용, 알림=${waitUntilSoundSec.toFixed(2)}초 후`);
      } else {
        const rawSuffix = rawText && String(parsed) !== rawText.trim() ? ` (원본: "${rawText.trim()}")` : "";
        log(`슬롯${displayIndex}: AI=${parsed}${rawSuffix}, 지연=${latencySec.toFixed(2)}초, 알림=${waitUntilSoundSec.toFixed(2)}초 후`);
      }
      persistSettingsIfEnabled();

      return { parsed, latencySec, adjustedCooldownSec, waitUntilSoundSec, usedFallback };
    }

    function parseCooldownNumber(text, slot) {
      const normalized = String(text || "").trim();
      if (!normalized || /^none$/i.test(normalized)) return null;
      const match = normalized.match(/\d+(?:\.\d+)?/);
      if (!match) return null;
      let value = Number.parseFloat(match[0]);
      if (Number.isFinite(value)) {
        // AI가 22를 2.2로, 15를 1.5로 잘못 읽는 OCR 오류 자동 보정
        if (value % 1 !== 0 && value < 10) {
          const avg = getCooldownAverage(slot);
          if (avg !== null && avg > 10) {
            const cleanedStr = match[0].replace(".", "");
            const correctedValue = Number.parseFloat(cleanedStr);
            if (Number.isFinite(correctedValue) && Math.abs(correctedValue - avg) < Math.abs(value - avg)) {
              log(`[OCR 보정] AI가 ${value}로 읽은 값을 최근 평균(${avg.toFixed(1)})을 기반으로 ${correctedValue}로 자동 보정했습니다.`);
              value = correctedValue;
            }
          }
        }
        return value;
      }
      return null;
    }

    function rememberCooldownResponse(slot, value) {
      if (!Number.isFinite(value)) return;
      slot.cooldownHistory.push(value);
      if (slot.cooldownHistory.length > 10) {
        slot.cooldownHistory.shift();
      }
    }

    function getCooldownAverage(slot) {
      if (slot.cooldownHistory.length === 0) return null;
      const sum = slot.cooldownHistory.reduce((total, value) => total + value, 0);
      return sum / slot.cooldownHistory.length;
    }

    async function callGeminiApi(settings, imageBase64) {
      const url = "/api/gemini";
      const response = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          provider: settings.provider,
          prompt: OCR_PROMPT,
          imageBase64,
          vertex: settings.provider === "vertex" ? settings.vertex : undefined,
          studio: settings.provider === "studio" ? settings.studio : undefined,
          custom: settings.provider === "custom" ? settings.custom : undefined
        })
      });
      const data = await parseJsonResponse(response);
      if (!data.text) {
        throw new Error("Gemini 응답에 텍스트가 없습니다.");
      }
      return String(data.text).trim();
    }

    async function parseJsonResponse(response) {
      const text = await response.text();
      let data;
      try {
        data = text ? JSON.parse(text) : {};
      } catch (error) {
        throw new Error(`API 응답을 JSON으로 읽지 못했습니다: ${text.slice(0, 140)}`);
      }
      if (!response.ok) {
        const message = typeof data?.error === "string"
          ? data.error
          : data?.error?.message || data?.message || response.statusText || "요청 실패";
        const source = data?.source ? `[${data.source}] ` : "";
        throw new Error(`${response.status} ${source}${message}`);
      }
      return data;
    }

    // ── Sound Playback ──

    function applyAudioVolume(audio, volume) {
      audio.volume = Math.min(1, Math.max(0, volume));
    }

    async function unlockAudioElement(audio) {
      try {
        audio.muted = true;
        await audio.play();
        audio.pause();
        audio.currentTime = 0;
      } catch (_) {
        // The real alarm play will report a visible log if the browser blocks it.
      } finally {
        audio.muted = false;
      }
    }

    async function unlockAudio() {
      await unlockAudioElement(els.alarmAudio);
    }

    async function playSlotSound(slot) {
      const displayIndex = getSlotDisplayIndex(slot);
      if (slot.soundMode === "webaudio") {
        await playWebAudioBeep(slot);
        log(`슬롯${displayIndex}: Web Audio 비프음을 재생했습니다.`);
      } else {
        await playChickenForSlot(slot);
        log(`슬롯${displayIndex}: chicken.mp3를 재생했습니다.`);
      }
    }

    async function playChickenForSlot(slot) {
      const count = Math.max(1, Math.min(10, slot.soundRepeatCount));
      for (let i = 0; i < count; i++) {
        if (i > 0) await wait(300);
        applyAudioVolume(els.alarmAudio, slot.volume);
        els.alarmAudio.currentTime = 0;
        await els.alarmAudio.play();
        // Wait for the audio to finish if repeating
        if (count > 1 && i < count - 1) {
          await new Promise(resolve => {
            els.alarmAudio.addEventListener("ended", resolve, { once: true });
          });
        }
      }
    }

    async function playWebAudioBeep(slot) {
      const ctx = getAudioCtx();
      const { waveform, frequency, duration, repeatCount, repeatGap } = slot.webAudio;
      const vol = Math.min(1, Math.max(0, slot.volume));

      for (let i = 0; i < repeatCount; i++) {
        if (i > 0) await wait(repeatGap);

        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = waveform;
        osc.frequency.value = frequency;
        gain.gain.setValueAtTime(vol, ctx.currentTime);
        // Smooth fade out at the end
        const durSec = duration / 1000;
        gain.gain.setValueAtTime(vol, ctx.currentTime + durSec * 0.7);
        gain.gain.linearRampToValueAtTime(0, ctx.currentTime + durSec);

        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + durSec);

        await wait(duration);
      }
    }

    async function playFantasia() {
      applyAudioVolume(els.fantasiaAudio, 1);
      els.fantasiaAudio.currentTime = 0;
      await els.fantasiaAudio.play();
      log("fantasia.mp3를 재생했습니다.");
    }

    // ── Slot Loop Management ──

    function updateSlotStatus(slot, text, active = false) {
      if (slot.els.statusMini) {
        slot.els.statusMini.textContent = text;
        slot.els.statusMini.classList.toggle("active", active);
      }
    }

    function clearSlotTimers(slot) {
      if (slot.timerId) {
        clearTimeout(slot.timerId);
        slot.timerId = null;
      }
      if (slot.tickerId) {
        clearInterval(slot.tickerId);
        slot.tickerId = null;
      }
      slot.nextPlayAt = null;
    }

    function startSlotTicker(slot) {
      if (slot.tickerId) clearInterval(slot.tickerId);
      slot.tickerId = setInterval(() => {
        if (!slot.nextPlayAt) return;
        const remain = Math.max(0, (slot.nextPlayAt - Date.now()) / 1000);
        if (slot.els.remainingText) slot.els.remainingText.textContent = formatSeconds(remain);
        if (remain <= 0) {
          clearInterval(slot.tickerId);
          slot.tickerId = null;
        }
      }, 200);
    }

    function stopSlotLoop(slot) {
      slot.running = false;
      slot.activeRunId += 1;
      clearSlotTimers(slot);
      updateSlotStatus(slot, "대기", false);
    }

    async function runSlotCycle(slot, runId) {
      if (!slot.running || runId !== slot.activeRunId || !state.running) return;
      clearSlotTimers(slot);
      const displayIndex = getSlotDisplayIndex(slot);
      try {
        syncSlotFromUI(slot);
        const result = await recognizeCooldownForSlot(slot);
        if (!slot.running || runId !== slot.activeRunId || !state.running) return;
        const delayMs = Math.max(0, result.waitUntilSoundSec * 1000);
        slot.nextPlayAt = Date.now() + delayMs;
        updateSlotStatus(slot, "대기 중", true);
        startSlotTicker(slot);
        slot.timerId = setTimeout(async () => {
          if (!slot.running || runId !== slot.activeRunId || !state.running) return;
          try {
            await playSlotSound(slot);
          } catch (error) {
            log(`슬롯${displayIndex} 소리 재생 실패: ${error.message}`);
          }
          if (!slot.running || runId !== slot.activeRunId || !state.running) return;
          const repeatDelay = Math.max(0, slot.repeatAfterSec * 1000);
          if (slot.els.remainingText) slot.els.remainingText.textContent = "재인식 대기";
          updateSlotStatus(slot, "재인식 대기", true);
          slot.timerId = setTimeout(() => {
            void runSlotCycle(slot, runId);
          }, repeatDelay);
        }, delayMs);
      } catch (error) {
        log(`슬롯${displayIndex} 오류: ${error.message}`);
        updateSlotStatus(slot, "오류", false);
        if (!slot.running || runId !== slot.activeRunId || !state.running) return;
        const retryMs = Math.max(1000, slot.repeatAfterSec * 1000);
        slot.timerId = setTimeout(() => {
          void runSlotCycle(slot, runId);
        }, retryMs);
      }
    }

    // ── Global Start/Stop ──

    async function startLoop() {
      if (state.running) return;
      if (!state.stream) {
        await selectScreen();
      }
      await unlockAudio();

      // Sync all slot data from UI
      for (const slot of state.slots) {
        syncSlotFromUI(slot);
      }

      state.running = true;
      state.globalRunId += 1;
      els.startBtn.disabled = true;
      els.stopBtn.disabled = false;
      els.singleRead.disabled = true;
      els.selectScreen.disabled = true;

      const globalRunId = state.globalRunId;
      let countdown = 5;
      log(`${countdown}초 후 반복 인식을 시작합니다... (${state.slots.length}개 슬롯)`);

      const nextCountdown = () => {
        if (!state.running || globalRunId !== state.globalRunId) return;
        if (countdown > 0) {
          setStatus(`${countdown}초 후 시작`, "waiting");
          countdown--;
          setTimeout(nextCountdown, 1000);
        } else {
          setStatus("실행 중", "running");
          log("반복 인식을 시작했습니다.");
          for (const slot of state.slots) {
            slot.running = true;
            slot.activeRunId += 1;
            updateSlotStatus(slot, "실행 중", true);
            void runSlotCycle(slot, slot.activeRunId);
          }
        }
      };
      nextCountdown();
    }

    async function singleRead() {
      if (!state.stream) {
        await selectScreen();
      }
      for (const slot of state.slots) {
        syncSlotFromUI(slot);
      }
      for (const slot of state.slots) {
        try {
          const result = await recognizeCooldownForSlot(slot);
          log(`슬롯${getSlotDisplayIndex(slot)}: 1회 인식 완료: ${result.waitUntilSoundSec.toFixed(2)}초 후 알림 값`);
        } catch (error) {
          log(`슬롯${getSlotDisplayIndex(slot)}: 1회 인식 실패: ${error.message}`);
        }
      }
      setStatus("1회 인식 완료", "");
    }

    function stopStreamOnly() {
      const stream = state.stream;
      state.stream = null;
      if (stream) {
        for (const track of stream.getTracks()) {
          try {
            track.enabled = false;
            track.stop();
          } catch (_) {
            // Track cleanup should be best effort during page shutdown.
          }
        }
      }
      els.sourceVideo.pause();
      els.sourceVideo.srcObject = null;
      els.sourceVideo.removeAttribute("src");
      try {
        els.sourceVideo.load();
      } catch (_) {
        // Some browsers do not like load() during unload; detaching srcObject is enough there.
      }
      // Clear all slot canvases
      for (const slot of state.slots) {
        if (slot.canvasEl) {
          const ctx = slot.canvasEl.getContext("2d");
          ctx.clearRect(0, 0, slot.canvasEl.width, slot.canvasEl.height);
        }
      }
      els.emptyPreview.classList.remove("hidden");
      // Hide all crop boxes
      document.querySelectorAll(".crop-box").forEach(b => b.classList.remove("visible"));
    }

    function stopAll(message = "종료했습니다.") {
      state.running = false;
      state.globalRunId += 1;
      for (const slot of state.slots) {
        stopSlotLoop(slot);
      }
      els.startBtn.disabled = false;
      els.stopBtn.disabled = true;
      els.singleRead.disabled = false;
      els.selectScreen.disabled = false;
      els.alarmAudio.pause();
      els.alarmAudio.currentTime = 0;
      stopStreamOnly();
      setStatus("대기 중", "");
      log(message);
    }

    function releasePageResources() {
      state.running = false;
      state.globalRunId += 1;
      for (const slot of state.slots) {
        stopSlotLoop(slot);
      }
      clearFantasiaTimer(null);
      els.alarmAudio.pause();
      els.fantasiaAudio.pause();
      stopStreamOnly();
    }

    // ── Fantasia Timer ──

    function clearFantasiaTimer(label = "-") {
      if (state.fantasiaTimerId) {
        clearTimeout(state.fantasiaTimerId);
        state.fantasiaTimerId = null;
      }
      if (state.fantasiaTickerId) {
        clearInterval(state.fantasiaTickerId);
        state.fantasiaTickerId = null;
      }
      state.fantasiaPlayAt = null;
      els.fantasiaStart.disabled = false;
      els.fantasiaStop.disabled = true;
      if (label !== null) {
        els.fantasiaRemaining.textContent = label;
      }
    }

    function startFantasiaTicker() {
      if (state.fantasiaTickerId) clearInterval(state.fantasiaTickerId);
      state.fantasiaTickerId = setInterval(() => {
        if (!state.fantasiaPlayAt) return;
        const remain = Math.max(0, (state.fantasiaPlayAt - Date.now()) / 1000);
        els.fantasiaRemaining.textContent = formatSeconds(remain);
        if (remain <= 0) {
          clearInterval(state.fantasiaTickerId);
          state.fantasiaTickerId = null;
        }
      }, 200);
    }

    async function startFantasiaTimer() {
      const minutes = Math.max(0, readNumber(els.fantasiaMinutes, 10));
      const delayMs = minutes * 60 * 1000;
      await unlockAudioElement(els.fantasiaAudio);
      clearFantasiaTimer(null);
      state.fantasiaPlayAt = Date.now() + delayMs;
      els.fantasiaStart.disabled = true;
      els.fantasiaStop.disabled = false;
      els.fantasiaRemaining.textContent = formatSeconds(delayMs / 1000);
      startFantasiaTicker();
      persistSettingsIfEnabled();
      log(`fantasia.mp3를 ${minutes}분 후 재생하도록 예약했습니다.`);
      state.fantasiaTimerId = setTimeout(async () => {
        try {
          await playFantasia();
          clearFantasiaTimer("완료");
        } catch (error) {
          clearFantasiaTimer("재생 실패");
          log(`fantasia 재생 실패: ${error.message}`);
        }
      }, delayMs);
    }

    function stopFantasiaTimer() {
      clearFantasiaTimer("-");
      els.fantasiaAudio.pause();
      els.fantasiaAudio.currentTime = 0;
      log("fantasia 예약을 취소했습니다.");
    }

    // ── Service Account JSON ──

    async function loadServiceAccountFile(file) {
      const data = JSON.parse(await file.text());
      els.vertexProjectId.value = data.project_id || els.vertexProjectId.value;
      els.vertexClientEmail.value = data.client_email || els.vertexClientEmail.value;
      els.vertexPrivateKey.value = data.private_key || els.vertexPrivateKey.value;
      persistSettingsIfEnabled();
      log("서비스 계정 JSON을 읽었습니다.");
    }

    // ── Events ──

    function attachEvents() {
      els.providerVertex.addEventListener("click", () => switchProvider("vertex"));
      els.providerStudio.addEventListener("click", () => switchProvider("studio"));
      els.providerCustom.addEventListener("click", () => switchProvider("custom"));
      els.saveSettingsNow.addEventListener("click", saveSettings);
      els.clearSettings.addEventListener("click", clearSavedSettings);
      els.loadServiceJson.addEventListener("click", () => els.serviceJsonFile.click());
      els.serviceJsonFile.addEventListener("change", async () => {
        const file = els.serviceJsonFile.files?.[0];
        if (!file) return;
        try {
          await loadServiceAccountFile(file);
        } catch (error) {
          log(`서비스 계정 JSON 읽기 실패: ${error.message}`);
        } finally {
          els.serviceJsonFile.value = "";
        }
      });

      const persistTargets = [
        els.vertexProjectId,
        els.vertexLocation,
        els.vertexClientEmail,
        els.vertexModelId,
        els.vertexPrivateKey,
        els.studioApiKey,
        els.studioModelId,
        els.customUrl,
        els.customApiKey,
        els.customModelId,
        els.customPartOrder,
        els.fantasiaMinutes,
        els.lowLoadCapture
      ];
      for (const input of persistTargets) {
        input.addEventListener("input", persistSettingsIfEnabled);
      }
      els.customPartOrder.addEventListener("change", persistSettingsIfEnabled);
      els.saveSettings.addEventListener("change", () => {
        if (els.saveSettings.checked) {
          saveSettings();
        } else {
          clearSavedSettings();
        }
      });

      els.selectScreen.addEventListener("click", async () => {
        try {
          await selectScreen();
        } catch (error) {
          log(`화면 선택 실패: ${error.message}`);
        }
      });
      els.singleRead.addEventListener("click", async () => {
        try {
          await singleRead();
        } catch (error) {
          log(`1회 인식 실패: ${error.message}`);
          setStatus("대기 중", "");
        }
      });
      els.startBtn.addEventListener("click", async () => {
        try {
          await startLoop();
        } catch (error) {
          stopAll(`시작 실패: ${error.message}`);
        }
      });
      els.stopBtn.addEventListener("click", () => stopAll("사용자가 종료했습니다."));

      els.fantasiaStart.addEventListener("click", async () => {
        try {
          await startFantasiaTimer();
        } catch (error) {
          clearFantasiaTimer("시작 실패");
          log(`fantasia 예약 실패: ${error.message}`);
        }
      });
      els.fantasiaStop.addEventListener("click", stopFantasiaTimer);
      els.fantasiaTest.addEventListener("click", async () => {
        try {
          await playFantasia();
        } catch (error) {
          log(`fantasia 테스트 실패: ${error.message}`);
        }
      });

      // Add slot button
      els.addSlotBtn.addEventListener("click", () => {
        addSlot();
      });

      els.sourceVideo.addEventListener("loadedmetadata", renderAllCropBoxes);
      window.addEventListener("resize", renderAllCropBoxes);
      window.addEventListener("pagehide", releasePageResources);
      window.addEventListener("beforeunload", releasePageResources);
    }

    attachEvents();
    loadSettings();
    setStatus("대기 중", "");
    log("준비되었습니다. 스킬 슬롯을 추가하고 각각의 인식 영역을 설정하세요.");
  </script>
</body>
</html>
